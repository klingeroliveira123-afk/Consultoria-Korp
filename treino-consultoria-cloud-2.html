<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Consultoria de Treino</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Spline+Sans:wght@400;500;600;700&family=Spline+Sans+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0e0f12; --bg2:#15171c; --card:#1b1e25; --card2:#21252e;
  --line:#2c313c; --line2:#373d4a;
  --ink:#f3f1ea; --ink-dim:#a8adb8; --ink-faint:#6b7280;
  --accent:#f0412b; --accent-soft:#3a1c19;
  --good:#46c479; --good-soft:#16321f;
  --warn:#e8b23a; --info:#5aa9e6;
  --r:14px; --r-sm:9px;
  --shadow:0 8px 30px rgba(0,0,0,.35);
  --disp:"Bricolage Grotesque",Georgia,serif;
  --body:"Spline Sans",system-ui,sans-serif;
  --mono:"Spline Sans Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--ink);font-size:15px;line-height:1.5;-webkit-font-smoothing:antialiased;
  background-image:radial-gradient(900px 500px at 85% -10%, #1a1c22 0%, transparent 60%),radial-gradient(700px 400px at -10% 110%, #18120f 0%, transparent 55%);background-attachment:fixed;}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px}
.mono{font-family:var(--mono)}
::placeholder{color:var(--ink-faint)}

.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:12px;padding:12px 18px;background:rgba(14,15,18,.82);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}
.brand{display:flex;align-items:center;gap:11px;min-width:0;cursor:pointer}
.brand .mark{width:34px;height:34px;border-radius:9px;flex:none;background:linear-gradient(150deg,var(--accent),#ff7a4d);display:grid;place-items:center;font-family:var(--disp);font-weight:800;color:#fff;font-size:20px;box-shadow:0 4px 14px rgba(240,65,43,.4)}
.brand .t{min-width:0}
.brand .t .nm{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:-.01em;line-height:1}
.brand .t .sub{font-size:11.5px;color:var(--ink-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.switcher{position:relative}
.switcher-btn{display:flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--line);border-radius:11px;padding:6px 12px 6px 8px;color:var(--ink);max-width:240px}
.switcher-btn:hover{border-color:var(--line2)}
.switcher-btn .av{width:26px;height:26px;border-radius:7px;flex:none;display:grid;place-items:center;font-weight:700;font-size:13px;color:#fff}
.switcher-btn .nm{font-weight:600;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.switcher-btn .ar{color:var(--ink-faint);font-size:11px}
.dropdown{position:absolute;left:0;top:46px;background:var(--card);border:1px solid var(--line2);border-radius:12px;box-shadow:var(--shadow);padding:6px;min-width:240px;max-height:320px;overflow:auto;z-index:60;display:none}
.dropdown.open{display:block;animation:pop .14s ease}
.dropdown .di{width:100%;text-align:left;border:none;background:transparent;color:var(--ink);padding:9px 10px;border-radius:8px;font-size:13.5px;display:flex;align-items:center;gap:10px}
.dropdown .di:hover{background:var(--card2)}
.dropdown .di .av{width:24px;height:24px;border-radius:6px;flex:none;display:grid;place-items:center;font-weight:700;font-size:12px;color:#fff}
.dropdown .di.all{color:var(--ink-dim);font-weight:600}
.dropdown .sep{height:1px;background:var(--line);margin:5px 4px}

.spacer{flex:1}
.modeswitch{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.modeswitch button{border:none;background:transparent;color:var(--ink-dim);padding:7px 13px;border-radius:7px;font-weight:600;font-size:13px;display:flex;align-items:center;gap:6px}
.modeswitch button.on{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(240,65,43,.35)}
.modeswitch button.on.aluno{background:var(--info);box-shadow:0 2px 8px rgba(90,169,230,.35)}
.iconbtn{border:1px solid var(--line);background:var(--bg2);color:var(--ink);width:38px;height:38px;border-radius:9px;display:grid;place-items:center;font-size:16px}
.iconbtn:hover{border-color:var(--line2);background:var(--card)}
.menu-wrap{position:relative}
.menu{position:absolute;right:0;top:46px;background:var(--card);border:1px solid var(--line2);border-radius:12px;box-shadow:var(--shadow);padding:6px;min-width:248px;z-index:60;display:none}
.menu.open{display:block;animation:pop .14s ease}
@keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
.menu button{width:100%;text-align:left;border:none;background:transparent;color:var(--ink);padding:10px 12px;border-radius:8px;font-size:13.5px;display:flex;align-items:center;gap:10px}
.menu button:hover{background:var(--card2)}
.menu .ic{width:18px;text-align:center;opacity:.85}
.menu .sep{height:1px;background:var(--line);margin:6px 4px}
.menu .hint{font-size:11px;color:var(--ink-faint);padding:6px 12px 8px;line-height:1.4}

.tabs{display:flex;gap:4px;padding:14px 18px 0;max-width:1180px;margin:0 auto;width:100%;align-items:center}
.tabs button[data-tab]{border:none;background:transparent;color:var(--ink-dim);font-weight:600;font-size:14px;padding:10px 16px;border-radius:10px 10px 0 0;position:relative}
.tabs button[data-tab].on{color:var(--ink)}
.tabs button[data-tab].on::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:3px;background:var(--accent);border-radius:3px}
.tabs button[data-tab]:hover{color:var(--ink)}
.crumb{display:flex;align-items:center;gap:8px;padding:14px 18px 0;max-width:1180px;margin:0 auto;width:100%}
.crumb .back{border:1px solid var(--line);background:var(--bg2);color:var(--ink-dim);border-radius:8px;padding:5px 11px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:6px}
.crumb .back:hover{border-color:var(--line2);color:var(--ink)}

.wrap{max-width:1180px;margin:0 auto;padding:18px;width:100%}
.savestate{font-size:11.5px;color:var(--ink-faint);margin-left:auto;white-space:nowrap}
.savestate b{color:var(--warn)}

.btn{border:1px solid var(--line2);background:var(--card2);color:var(--ink);padding:9px 14px;border-radius:9px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:7px}
.btn:hover{border-color:var(--ink-faint);background:#262b35}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#ff5238}
.btn.ghost{background:transparent;border-color:var(--line)}
.btn.sm{padding:6px 10px;font-size:12.5px;border-radius:8px}
.btn.danger:hover{border-color:var(--accent);color:#ff6e57}

/* ---------- Roster ---------- */
.roster-head{display:flex;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.roster-head h1{font-family:var(--disp);font-size:30px;font-weight:700;letter-spacing:-.02em;line-height:1}
.roster-head .cnt{font-size:13px;color:var(--ink-dim);margin-bottom:4px}
.searchbox{display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:8px 12px;min-width:200px}
.searchbox input{background:transparent;border:none;color:var(--ink);outline:none;width:100%}
.roster{display:grid;grid-template-columns:repeat(auto-fill,minmax(255px,1fr));gap:14px}
.scard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px;display:flex;flex-direction:column;gap:12px;cursor:pointer;transition:.15s;position:relative;overflow:hidden}
.scard:hover{border-color:var(--line2);transform:translateY(-2px);box-shadow:var(--shadow)}
.scard.inactive{opacity:.55}
.scard .top{display:flex;align-items:center;gap:12px}
.scard .av{width:46px;height:46px;border-radius:12px;flex:none;display:grid;place-items:center;font-family:var(--disp);font-weight:800;font-size:20px;color:#fff}
.scard .who{min-width:0;flex:1}
.scard .who .n{font-family:var(--disp);font-weight:700;font-size:17px;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard .who .g{font-size:12px;color:var(--ink-dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.scard .stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.scard .stat{background:var(--bg2);border-radius:9px;padding:8px 10px}
.scard .stat .l{font-size:9.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:700}
.scard .stat .v{font-family:var(--mono);font-weight:600;font-size:15px;margin-top:2px}
.scard .stat .v small{font-size:11px;color:var(--ink-dim)}
.scard .foot{display:flex;align-items:center;gap:8px;font-size:11.5px;color:var(--ink-faint)}
.scard .cardbtns{position:absolute;top:10px;right:10px;display:flex;gap:4px;opacity:0;transition:.15s}
.scard:hover .cardbtns{opacity:1}
.scard .cardbtns button{width:28px;height:28px;border-radius:7px;border:1px solid var(--line2);background:rgba(20,22,28,.9);color:var(--ink-dim);font-size:12px;display:grid;place-items:center}
.scard .cardbtns button:hover{color:var(--ink);border-color:var(--ink-faint)}
.scard .badge{font-size:9.5px;font-weight:700;letter-spacing:.04em;padding:2px 8px;border-radius:20px}
.badge.act{background:var(--good-soft);color:var(--good)}
.badge.inact{background:#2a2d34;color:var(--ink-faint)}
.addcard{border:1.5px dashed var(--line2);background:transparent;border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--ink-dim);min-height:150px;cursor:pointer;transition:.15s}
.addcard:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
.addcard .plus{font-size:30px;font-family:var(--disp)}

/* ---------- Treino layout ---------- */
.train-grid{display:grid;grid-template-columns:280px 1fr;gap:18px;align-items:start}
@media(max-width:860px){.train-grid{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r)}
.panel .head{display:flex;align-items:center;gap:10px;padding:14px 15px;border-bottom:1px solid var(--line)}
.panel .head h3{font-family:var(--disp);font-size:15px;font-weight:700;letter-spacing:-.01em}
.panel .head .spacer{flex:1}
.label-mini{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-faint);font-weight:600}
.weeklist{padding:8px;display:flex;flex-direction:column;gap:4px;max-height:62vh;overflow:auto}
.weekitem{text-align:left;border:1px solid transparent;background:var(--bg2);border-radius:10px;padding:10px 12px;color:var(--ink);display:flex;flex-direction:column;gap:2px;position:relative}
.weekitem:hover{background:var(--card2)}
.weekitem.on{border-color:var(--accent);background:var(--accent-soft)}
.weekitem .mo{font-size:9.5px;color:var(--ink-faint);font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1px}
.weekitem .mo:empty{display:none}
.weekitem .wk{font-weight:700;font-size:13.5px}
.weekitem .dt{font-size:11.5px;color:var(--ink-dim)}
.weekitem .tag{font-size:10px;padding:1px 7px;border-radius:20px;font-weight:700;letter-spacing:.03em;width:fit-content}
.tag.pub{background:var(--good-soft);color:var(--good)}
.tag.rasc{background:#332a16;color:var(--warn)}
.weekfoot{padding:10px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:8px}
.week-head{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;padding:16px 16px 14px;border-bottom:1px solid var(--line)}
.week-head .ttl input{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:-.01em;background:transparent;border:none;color:var(--ink);width:100%;padding:2px 0}
.week-head .ttl input:focus{outline:none;border-bottom:2px solid var(--accent)}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(--ink-faint);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{background:var(--bg2);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 10px}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--accent)}
.week-actions{display:flex;gap:8px;flex-wrap:wrap;padding:12px 16px;background:var(--bg2);border-bottom:1px solid var(--line);align-items:center}
.days{padding:14px 16px;display:flex;flex-direction:column;gap:14px}
.day{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--bg2)}
.day .dh{display:flex;align-items:center;gap:11px;padding:12px 14px;background:var(--card2);border-bottom:1px solid var(--line)}
.day .dh .code{width:30px;height:30px;border-radius:8px;background:var(--accent);color:#fff;font-family:var(--disp);font-weight:800;display:grid;place-items:center;font-size:15px;flex:none}
.day .dh .dtitle{font-weight:700;font-size:15px;background:transparent;border:none;color:var(--ink);flex:1;min-width:60px}
.day .dh .dtitle:focus{outline:none;border-bottom:1px dashed var(--ink-faint)}
.day .dbody{padding:12px 14px}
.note-row{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.note-row .k{font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:.05em;flex:none;width:74px;padding-top:8px}
.note-row textarea,.note-row input{flex:1;background:var(--bg);border:1px solid var(--line);color:var(--ink-dim);border-radius:7px;padding:7px 9px;font-size:13px;resize:vertical}
.extable{width:100%;border-collapse:collapse;font-size:13.5px}
.extable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-faint);font-weight:700;padding:6px 6px;border-bottom:1px solid var(--line)}
.extable td{padding:3px 4px;border-bottom:1px solid #23272f;vertical-align:middle}
.extable tr:last-child td{border-bottom:none}
.extable input{width:100%;background:transparent;border:1px solid transparent;color:var(--ink);border-radius:6px;padding:6px 7px;font-size:13.5px}
.extable input:hover{border-color:var(--line)}
.extable input:focus{outline:none;border-color:var(--accent);background:var(--bg)}
.extable .c-ex{min-width:140px}
.extable .num input{text-align:center;font-family:var(--mono)}
.extable .c-w input{font-family:var(--mono)}
.extable .delta{font-family:var(--mono);font-size:11.5px;font-weight:600;padding-left:4px;white-space:nowrap}
.delta.up{color:var(--good)} .delta.down{color:var(--info)} .delta.same{color:var(--ink-faint)} .delta.new{color:var(--warn)}
.rowdel{border:none;background:transparent;color:var(--ink-faint);font-size:15px;padding:4px 6px;border-radius:6px}
.rowdel:hover{color:var(--accent);background:var(--accent-soft)}
.addex{margin-top:8px}
.chk{width:22px;height:22px;border-radius:6px;border:2px solid var(--line2);background:transparent;display:grid;place-items:center;color:transparent;font-size:13px;flex:none}
.chk.done{background:var(--good);border-color:var(--good);color:#08130c}

.assess-top{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.statcard{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:15px 17px;min-width:150px;flex:1}
.statcard .lab{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-faint);font-weight:600}
.statcard .val{font-family:var(--disp);font-size:30px;font-weight:700;letter-spacing:-.02em;margin-top:4px}
.statcard .val small{font-size:14px;color:var(--ink-dim);font-weight:600}
.statcard .ch{font-size:12px;font-weight:600;margin-top:3px}
.ch.up{color:var(--good)} .ch.down{color:var(--info)} .ch.flat{color:var(--ink-faint)}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;margin-bottom:18px}
.chartbox{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px 8px}
.chartbox h4{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:2px;display:flex;align-items:center;gap:8px}
.chartbox h4 .dot{width:9px;height:9px;border-radius:3px;flex:none}
.chartbox .unit{font-size:11px;color:var(--ink-faint);margin-bottom:6px}
.cmp-wrap{overflow:auto;border:1px solid var(--line);border-radius:var(--r);background:var(--card)}
.cmp{border-collapse:collapse;width:100%;font-size:13px;min-width:480px}
.cmp th,.cmp td{padding:8px 12px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap}
.cmp th:first-child,.cmp td:first-child{text-align:left;position:sticky;left:0;background:var(--card);font-weight:600}
.cmp thead th{background:var(--card2);font-size:11.5px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-dim);position:sticky;top:0;cursor:pointer}
.cmp thead th:first-child{z-index:2;cursor:default}
.cmp .grouprow td{background:var(--bg2);font-weight:700;color:var(--accent);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
.cmp .delcol button{border:none;background:transparent;color:var(--ink-faint);cursor:pointer;font-size:14px}
.cmp .delcol button:hover{color:var(--accent)}
.cmp td.num{font-family:var(--mono)}

.overlay{position:fixed;inset:0;background:rgba(6,7,9,.7);backdrop-filter:blur(3px);z-index:100;display:none;align-items:center;justify-content:center;padding:18px}
.overlay.open{display:flex}
.modal{background:var(--card);border:1px solid var(--line2);border-radius:18px;box-shadow:var(--shadow);width:100%;max-width:560px;max-height:88vh;overflow:auto}
.modal .mh{display:flex;align-items:center;gap:10px;padding:18px 20px 0}
.modal .mh h3{font-family:var(--disp);font-size:19px;font-weight:700}
.modal .mh .spacer{flex:1}
.modal .mb{padding:16px 20px}
.modal .mf{padding:14px 20px 20px;display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}
.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.formgrid.cols3{grid-template-columns:1fr 1fr 1fr}
@media(max-width:520px){.formgrid,.formgrid.cols3{grid-template-columns:1fr 1fr}}
.fg-sec{grid-column:1/-1;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--accent);margin-top:6px;border-top:1px solid var(--line);padding-top:12px}

.empty{text-align:center;color:var(--ink-faint);padding:50px 20px}
.empty .big{font-family:var(--disp);font-size:18px;color:var(--ink-dim);margin-bottom:6px}
.hidden{display:none!important}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;background:var(--bg2);border:1px solid var(--line);border-radius:20px;padding:4px 11px;color:var(--ink-dim)}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--line2);color:var(--ink);padding:12px 18px;border-radius:11px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.25s;font-size:13.5px;font-weight:500}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.good{border-color:var(--good)} .toast.bad{border-color:var(--accent)}
.aluno-only{display:none}
.gate{position:fixed;inset:0;z-index:300;background:var(--bg);background-image:radial-gradient(900px 500px at 85% -10%, #1a1c22 0%, transparent 60%),radial-gradient(700px 400px at -10% 110%, #18120f 0%, transparent 55%);display:none;align-items:center;justify-content:center;padding:20px;overflow:auto}
.gate.open{display:flex}
.gate-card{background:var(--card);border:1px solid var(--line2);border-radius:18px;box-shadow:var(--shadow);width:100%;max-width:440px;padding:28px}
.gate-card.wide{max-width:620px}
.gate-logo{width:46px;height:46px;border-radius:12px;background:linear-gradient(150deg,var(--accent),#ff7a4d);display:grid;place-items:center;font-family:var(--disp);font-weight:800;color:#fff;font-size:26px;margin-bottom:16px;box-shadow:0 4px 14px rgba(240,65,43,.4)}
.gate h1{font-family:var(--disp);font-size:24px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.gate p.lead{color:var(--ink-dim);font-size:14px;margin-bottom:20px;line-height:1.55}
.gate .field{margin-bottom:14px}
.gate .field input{width:100%}
.gate .err{color:#ff6e57;font-size:13px;margin-bottom:12px;min-height:18px}
.gate .btn{width:100%;justify-content:center;margin-bottom:9px}
.gate .alt{text-align:center;font-size:13px;color:var(--ink-dim)}
.gate .alt a{color:var(--info);cursor:pointer;text-decoration:underline}

/* ---- body comp ---- */
const SITES7=["peitoral","axilar","subescapular","tricipital","suprailiaca","abdominal","coxa"];
function bodyComp(a){
  const age=numOrBlank(a.age)??25;
  const sum7=SITES7.reduce((s,k)=>s+(numOrBlank(a.dobras?.[k])||0),0);
  let bd=null,fat=null,fatMass=null,leanMass=null;
  if(sum7>0){
    bd=(a.sex==="1")?(1.097-0.00046971*sum7+0.00000056*sum7*sum7-0.00012828*age)
                    :(1.112-0.00043499*sum7+0.00000055*sum7*sum7-0.00028826*age);
    fat=495/bd-450;
    const w=numOrBlank(a.weightKg);
    if(w!=null){fatMass=w*fat/100;leanMass=w-fatMass;}
  }
  return{sum7,bd,fat,fatMass,leanMass};
}

/* ---- persistence (nuvem) ---- */
function cacheLocal(){try{localStorage.setItem(LS_KEY,JSON.stringify(state));}catch(e){}}

async function saveStudent(s){
  if(isStudent||!sb||!session||!s)return;
  const {error}=await sb.from("students").update({
    name:s.name,goal:s.goal,sex:s.sex,age:s.age,start_date:s.startDate||null,active:s.active,
    data:{weeks:s.weeks,assessments:s.assessments},pub:pubOf(s),updated_at:new Date().toISOString()
  }).eq("id",s.id);
  if(error){toast("Erro ao salvar na nuvem","bad");console.error(error);renderSaveState();}
  else{dirty=false;renderSaveState();}
}
async function createStudent(o){
  const ns=newStudent(o);

    data:{weeks:ns.weeks,assessments:ns.assessments},pub:pubOf(ns)
  }).select().single();
  if(error){toast("Erro ao criar aluno","bad");console.error(error);return null;}
  const st=rowToStudent(data);state.students.push(st);renderBrand();return st;
}

/* ---- gate (config / login / loading) ---- */
function gate(html){$("#gateInner").innerHTML=html;$("#gate").classList.add("open");}
function closeGate(){$("#gate").classList.remove("open");}
function configured(){return SUPABASE_URL.startsWith("https://")&&SUPABASE_ANON_KEY.length>30;}

function showConfig(){
  gate(`<div class="gate-card wide"><div class="gate-logo">C</div>
    <h1>Configuração inicial</h1>
    <p class="lead">Para sincronizar na nuvem, conecte seu projeto Supabase (gratuito). Faça uma vez:</p>

function showLoading(msg){gate(`<div class="gate-card" style="text-align:center"><div class="gate-spin"></div><p class="lead" style="margin:0">${esc(msg||"Carregando…")}</p></div>`);}

let authMode="login";
function showLogin(err){
  gate(`<div class="gate-card"><div class="gate-logo">C</div>
    <h1>${authMode==="login"?"Entrar":"Criar conta"}</h1>
    <p class="lead">Painel do treinador — seus alunos ficam salvos na nuvem e acessíveis de qualquer lugar.</p>
    <div class="field"><input id="authEmail" type="email" placeholder="seu@email.com" autocomplete="username"></div>
    <div class="field"><input id="authPass" type="password" placeholder="senha" autocomplete="current-password"></div>
    <div class="err">${err?esc(err):""}</div>
    <button class="btn primary" id="authGo">${authMode==="login"?"Entrar":"Criar conta"}</button>
    <p class="alt">${authMode==="login"?'Primeira vez? <a id="authToggle">Criar conta</a>':'Já tem conta? <a id="authToggle">Entrar</a>'}</p></div>`);
  $("#authGo").onclick=doAuth;
  $("#authPass").onkeydown=e=>{if(e.key==="Enter")doAuth();};
  $("#authToggle").onclick=()=>{authMode=authMode==="login"?"signup":"login";showLogin();};
}
async function doAuth(){
  const email=$("#authEmail").value.trim(),pass=$("#authPass").value;
  if(!email||!pass){showLogin("Preencha email e senha.");return;}
  showLoading(authMode==="login"?"Entrando…":"Criando conta…");
  let res;
  if(authMode==="login") res=await sb.auth.signInWithPassword({email,password:pass});
  else res=await sb.auth.signUp({email,password:pass});
  if(res.error){authMode=authMode;showLogin(traduzErro(res.error.message));return;}
  if(authMode==="signup"&&!res.data.session){showLogin("Conta criada! Confirme pelo email enviado e depois faça login. (Ou desative a confirmação de email em Authentication → Providers.)");authMode="login";return;}
  // onAuthStateChange cuida do resto
}
function traduzErro(m){m=(m||"").toLowerCase();
  if(m.includes("invalid login"))return "Email ou senha incorretos.";
  if(m.includes("already registered"))return "Este email já tem conta. Faça login.";
  if(m.includes("password"))return "A senha precisa ter ao menos 6 caracteres.";
  if(m.includes("email"))return "Verifique o email informado.";
  return m;}
async function logout(){await sb.auth.signOut();location.reload();}

function studentTokenFromURL(){const h=location.hash||"";const m=h.match(/[#&]s=([0-9a-f-]{20,})/i);return m?m[1]:null;}

  const {data,error}=await sb.rpc("get_student_snapshot",{p_token:token});
  if(error||!data||!data.length){return gate(`<div class="gate-card"><div class="gate-logo">C</div><h1>Link inválido</h1><p class="lead">Não encontramos esse treino. Confira o link com seu treinador — ele pode ter sido atualizado.</p></div>`);}
  const row=data[0],pub=row.pub||{};
  state={meta:{coachName:row.coach_name||"Consultoria",clientSnapshot:true},students:[{id:"stu",name:row.name,sex:pub.sex||"2",age:pub.age||"",goal:pub.goal||"",weeks:pub.weeks||[],assessments:pub.assessments||[],active:true}]};
  ui.mode="aluno";ui.curStudent="stu";ui.view="workspace";ui.tab="treino";
  closeGate();applyMode();renderBrand();renderView();
  // botão atualizar
  const sv=$("#saveState");if(sv)sv.innerHTML=`<a id="stuRefresh" style="color:var(--info);cursor:pointer">↻ atualizar</a>`;
  const r=$("#stuRefresh");if(r)r.onclick=()=>location.reload();
}

/* ---- boot ---- */
async function boot(){
  const token=studentTokenFromURL();
  if(token){return bootStudent(token);}
  if(!configured()){showConfig();return;}
  showLoading("Conectando…");
  try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);}catch(e){showConfig();return;}
  state={meta:{coachName:localStorage.getItem("coach_name")||"Consultoria",clientSnapshot:false},students:[]};
  sb.auth.onAuthStateChange((_e,s)=>{session=s; if(s)onLoggedIn(); else showLogin();});
  const {data}=await sb.auth.getSession();
  session=data.session;
  if(session)onLoggedIn(); else showLogin();
}
async function onLoggedIn(){
  showLoading("Carregando seus alunos…");
  await loadStudents();
  // migração de dados locais antigos (primeira vez)
  if(state.students.length===0){
    let local=null;try{local=JSON.parse(localStorage.getItem(LS_KEY));}catch(e){}
    local=migrate(local);
    if(local&&local.students&&local.students.length){
      showLoading("Migrando seus dados para a nuvem…");
      for(const s of local.students){await createStudent(s.name?{...s}:s).catch(()=>{});}
      await reSyncMigrated(local.students);
      await loadStudents();
      toast("Dados migrados para a nuvem ✔","good");
    }
  }
  ui.mode="coach";ui.view="roster";ui.curStudent=state.students[0]?.id||null;
  closeGate();applyMode();renderBrand();renderView();renderSaveState();
}
async function reSyncMigrated(localStudents){
  // createStudent gera nova semana em branco; reescreve com os dados reais migrados
  for(let i=0;i<state.students.length;i++){
    const local=localStudents[i];const cloud=state.students[i];
    if(local&&cloud){cloud.weeks=local.weeks||cloud.weeks;cloud.assessments=local.assessments||[];await saveStudent(cloud);}
  }
}

function studentQuick(s){
  const A=s.assessments.slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));
  let w=null,fat=null,lastDate=A[A.length-1]?.date||null;
  for(let i=A.length-1;i>=0;i--){if(w==null){const v=numOrBlank(A[i].weightKg);if(v!=null)w=v;}}
  for(let i=A.length-1;i>=0;i--){const c=bodyComp(A[i]);if(c.fat!=null){fat=c.fat;break;}}
  const pub=s.weeks.filter(x=>x.status==="publicado").length;
  return{w,fat,lastDate,weeks:s.weeks.length,pub};
}

function duplicateWeek(){

  const clone={id:uid(),label:`Semana ${n} · ${fmtDate(ns)} a ${fmtDate(ne)}`,startDate:ns,endDate:ne,month:w.month,note:"",status:"rascunho",
    days:w.days.map(d=>({id:uid(),code:d.code,title:d.title,warmup:d.warmup,cardio:d.cardio,note:d.note,
      exercises:d.exercises.map(e=>({id:uid(),name:e.name,weight:e.weight,sets:e.sets,reps:e.reps,rest:e.rest,how:e.how,done:false}))}))};
  s.weeks.push(clone);ui.selWeek=clone.id;ui.compare=true;markDirty();renderWeekList();renderWeekEditor();

function newBlankWeek(){

function delWeek(){const w=findWeek(ui.selWeek);if(!w)return;if(!confirm(`Excluir "${w.label}"?`))return;const s=cur();s.weeks=s.weeks.filter(x=>x.id!==w.id);ui.selWeek=s.weeks[0]?.id||null;markDirty();renderWeekList();renderWeekEditor();}
function addDay(){const w=findWeek(ui.selWeek);if(!w)return;const used=new Set(w.days.map(d=>d.code));const code="ABCDEFGHIJ".split("").find(c=>!used.has(c))||"X";w.days.push({id:uid(),code,title:"",warmup:"",cardio:"",note:"",exercises:[{id:uid(),name:"",weight:"",sets:"",reps:"",rest:"",how:"",done:false}]});markDirty();renderWeekEditor();}

/* ---- assessments ---- */
const CIRC_LABELS={ombros:"Ombros",torax:"Tórax",bracoD:"Braço dir.",bracoE:"Braço esq.",antebracoD:"Antebraço dir.",antebracoE:"Antebraço esq.",abdominal:"Abdominal",cintura:"Cintura",quadril:"Quadril",coxaD:"Coxa dir.",coxaE:"Coxa esq.",pernaD:"Perna dir.",pernaE:"Perna esq."};
const DOBRA_LABELS={peitoral:"Peitoral",axilar:"Axilar média",subescapular:"Subescapular",tricipital:"Tricipital",bicipital:"Bicipital",suprailiaca:"Suprailíaca",abdominal:"Abdominal",coxa:"Coxa",panturrilha:"Panturrilha med."};
function sortedAssessments(){return(cur()?.assessments||[]).slice().sort((a,b)=>(a.date||"").localeCompare(b.date||""));}
function renderAval(){const A=sortedAssessments();$("#avalSpan").textContent=A.length?`${A.length} avaliações · ${fmtDate(A[0].date)} → ${fmtDate(A[A.length-1].date)}`:"sem dados";renderStatCards(A);renderCharts(A);renderCmpTable(A);}
function latestWith(A,g){for(let i=A.length-1;i>=0;i--){const v=g(A[i]);if(v!=null)return{v,i};}return null;}
function statCard(lab,unit,g,A,dec=1){
  const cur2=latestWith(A,g);if(!cur2)return `<div class="statcard"><div class="lab">${lab}</div><div class="val">—</div></div>`;
  let prev=null;for(let i=cur2.i-1;i>=0;i--){const v=g(A[i]);if(v!=null){prev=v;break;}}
  let ch="";if(prev!=null){const d=+(cur2.v-prev).toFixed(dec);ch=`<div class="ch ${d>0?"up":d<0?"down":"flat"}">${d>0?"▲ +":d<0?"▼ ":"= "}${d!==0?Math.abs(d):""} ${unit} vs anterior</div>`;}
  return `<div class="statcard"><div class="lab">${lab}</div><div class="val">${(+cur2.v).toFixed(dec).replace(/\.0$/,"")}<small> ${unit}</small></div>${ch}</div>`;
}
function renderStatCards(A){$("#statCards").innerHTML=
  statCard("Massa corporal","kg",a=>numOrBlank(a.weightKg),A)+
  statCard("% Gordura","%",a=>bodyComp(a).fat,A)+
  statCard("Massa magra","kg",a=>bodyComp(a).leanMass,A)+
  statCard("Cintura","cm",a=>numOrBlank(a.circ?.cintura),A)+
  statCard("Σ 7 dobras","mm",a=>{const c=bodyComp(a);return c.sum7||null;},A,0);}
function lineChart(series,color){
  const pts=series.filter(p=>p.v!=null);
  if(!pts.length)return `<div style="color:var(--ink-faint);font-size:12px;padding:20px 0">Sem dados ainda.</div>`;
  const W=300,H=110,pL=4,pR=4,pT=10,pB=16;
  const xs=pts.map((_,i)=>pts.length===1?W/2:pL+i*(W-pL-pR)/(pts.length-1));
  const vals=pts.map(p=>p.v);let mn=Math.min(...vals),mx=Math.max(...vals);if(mn===mx){mn-=1;mx+=1;}const pad=(mx-mn)*0.15;mn-=pad;mx+=pad;
  const ys=vals.map(v=>pT+(1-(v-mn)/(mx-mn))*(H-pT-pB));
  const d=xs.map((x,i)=>`${i?"L":"M"}${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ");
  const area=`M${xs[0].toFixed(1)},${(H-pB).toFixed(1)} `+xs.map((x,i)=>`L${x.toFixed(1)},${ys[i].toFixed(1)}`).join(" ")+` L${xs[xs.length-1].toFixed(1)},${(H-pB).toFixed(1)} Z`;
  const dots=xs.map((x,i)=>`<circle class="dot" cx="${x.toFixed(1)}" cy="${ys[i].toFixed(1)}" r="3.4" fill="${color}"/>`).join("");
  const labels=pts.map((p,i)=>`<text x="${xs[i].toFixed(1)}" y="${H-3}" text-anchor="middle">${p.lab}</text>`).join("");
  const vlab=pts.map((p,i)=>`<text x="${xs[i].toFixed(1)}" y="${(ys[i]-7).toFixed(1)}" text-anchor="middle" fill="${color}">${(+p.v).toFixed(1).replace(/\.0$/,"")}</text>`).join("");
  return `<svg class="lc" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none"><path class="area" d="${area}" fill="${color}"/><path class="ln" d="${d}" stroke="${color}"/>${dots}${vlab}${labels}</svg>`;
}
function renderCharts(A){
  const dts=A.map(a=>fmtDate(a.date));
  const defs=[{t:"Massa corporal",u:"kg",c:"#f0412b",g:a=>numOrBlank(a.weightKg)},{t:"% de gordura",u:"%",c:"#46c479",g:a=>bodyComp(a).fat},{t:"Massa magra",u:"kg",c:"#5aa9e6",g:a=>bodyComp(a).leanMass},{t:"Cintura",u:"cm",c:"#e8b23a",g:a=>numOrBlank(a.circ?.cintura)},{t:"Tórax",u:"cm",c:"#c77dff",g:a=>numOrBlank(a.circ?.torax)},{t:"Σ 7 dobras",u:"mm",c:"#ff9f43",g:a=>{const c=bodyComp(a);return c.sum7||null;}}];
  $("#chartsGrid").innerHTML=defs.map(def=>`<div class="chartbox"><h4><span class="dot" style="background:${def.c}"></span>${def.t}</h4><div class="unit">${def.u}</div>${lineChart(A.map((a,i)=>({lab:dts[i],v:def.g(a)})),def.c)}</div>`).join("");
}
function renderCmpTable(A){
  if(!A.length){$("#cmpTable").innerHTML=`<tr><td style="padding:20px;color:var(--ink-faint)">Nenhuma avaliação cadastrada.</td></tr>`;return;}
  const coach=ui.mode==="coach";
  const head=`<thead><tr><th>Medida</th>${A.map(a=>`<th>${fmtDate(a.date)}</th>`).join("")}</tr>${coach?`<tr class="delcol"><th></th>${A.map(a=>`<th><button data-delaval="${a.id}">🗑</button></th>`).join("")}</tr>`:""}</thead>`;
  const row=(l,g,dec=1)=>`<tr><td>${l}</td>${A.map(a=>{const v=g(a);return `<td class="num">${v==null?"–":(+v).toFixed(dec).replace(/\.0$/,"")}</td>`;}).join("")}</tr>`;
  let b="<tbody>";
  b+=row("Idade [anos]",a=>numOrBlank(a.age),0);b+=row("Massa corporal [kg]",a=>numOrBlank(a.weightKg));
  b+=`<tr class="grouprow"><td colspan="${A.length+1}">Circunferências [cm]</td></tr>`;Object.keys(CIRC_LABELS).forEach(k=>b+=row(CIRC_LABELS[k],a=>numOrBlank(a.circ?.[k])));
  b+=`<tr class="grouprow"><td colspan="${A.length+1}">Dobras [mm]</td></tr>`;Object.keys(DOBRA_LABELS).forEach(k=>b+=row(DOBRA_LABELS[k],a=>numOrBlank(a.dobras?.[k])));
  b+=`<tr class="grouprow"><td colspan="${A.length+1}">Análise</td></tr>`;
  b+=row("Σ 7 dobras [mm]",a=>{const c=bodyComp(a);return c.sum7||null;},0);b+=row("Densidade [g/cm³]",a=>bodyComp(a).bd,4);b+=row("% de gordura",a=>bodyComp(a).fat);b+=row("Massa de gordura [kg]",a=>bodyComp(a).fatMass);b+=row("Massa magra [kg]",a=>bodyComp(a).leanMass);
  b+="</tbody>";$("#cmpTable").innerHTML=head+b;
}
function avalModal(existing){
  const last=cur()?.assessments.slice(-1)[0];
  const a=existing||{id:uid(),date:todayISO(),sex:cur()?.sex||last?.sex||"2",age:cur()?.age||last?.age||"",weightKg:"",heightM:last?.heightM||"",circ:{},dobras:{}};
  const f=(g,k,l,u)=>`<div class="field"><label>${l}${u?` [${u}]`:""}</label><input data-grp="${g}" data-k="${k}" value="${esc((g==="root"?a[k]:a[g]?.[k])||"")}" type="${g==="root"&&k==="date"?"date":"text"}" inputmode="${k==="date"?"":"decimal"}"></div>`;
  openModal(`<div class="mh"><h3>${existing?"Editar":"Nova"} avaliação</h3><div class="spacer"></div><button class="iconbtn" data-close>✕</button></div>
    <div class="mb"><div class="formgrid cols3">
      <div class="field"><label>Data</label><input data-grp="root" data-k="date" type="date" value="${esc(a.date)}"></div>
      <div class="field"><label>Sexo</label><select data-grp="root" data-k="sex"><option value="2" ${a.sex==="2"?"selected":""}>Masculino</option><option value="1" ${a.sex==="1"?"selected":""}>Feminino</option></select></div>
      <div class="field"><label>Idade [anos]</label><input data-grp="root" data-k="age" inputmode="decimal" value="${esc(a.age)}"></div>
      <div class="field"><label>Massa [kg]</label><input data-grp="root" data-k="weightKg" inputmode="decimal" value="${esc(a.weightKg)}"></div>
      <div class="field"><label>Altura [m]</label><input data-grp="root" data-k="heightM" inputmode="decimal" value="${esc(a.heightM)}"></div></div>
      <div class="formgrid cols3"><div class="fg-sec">Circunferências [cm]</div>${Object.keys(CIRC_LABELS).map(k=>f("circ",k,CIRC_LABELS[k],"cm")).join("")}</div>
      <div class="formgrid cols3"><div class="fg-sec">Dobras cutâneas [mm]</div>${Object.keys(DOBRA_LABELS).map(k=>f("dobras",k,DOBRA_LABELS[k],"mm")).join("")}</div>
      <p style="font-size:11.5px;color:var(--ink-faint);margin-top:12px">% de gordura por 7 dobras de Pollock (peitoral, axilar, subescapular, tricipital, suprailíaca, abdominal, coxa).</p></div>
    <div class="mf">${existing?`<button class="btn ghost danger" data-avaldel="${a.id}" style="margin-right:auto">Excluir</button>`:""}<button class="btn ghost" data-close>Cancelar</button><button class="btn primary" id="avalSave">Salvar avaliação</button></div>`);
  $("#avalSave").onclick=()=>{
    const obj={id:a.id,circ:{},dobras:{}};
    $$("[data-grp]",$("#modal")).forEach(el=>{const g=el.dataset.grp,k=el.dataset.k,v=el.value.trim();if(g==="root")obj[k]=v;else obj[g][k]=v;});
    const arr=cur().assessments,idx=arr.findIndex(x=>x.id===a.id);if(idx>=0)arr[idx]=obj;else arr.push(obj);
    markDirty();closeModal();renderAval();toast("Avaliação salva ✔","good");
  };
  const db=$("[data-avaldel]",$("#modal"));if(db)db.onclick=()=>{delAval(a.id);closeModal();};
}
function delAval(id){if(!confirm("Excluir esta avaliação?"))return;cur().assessments=cur().assessments.filter(x=>x.id!==id);markDirty();renderAval();}

/* ---- student modals ---- */
function studentModal(existing){
  const s=existing||{name:"",sex:"2",age:"",goal:"",startDate:todayISO(),active:true};
  openModal(`<div class="mh"><h3>${existing?"Editar aluno":"Novo aluno"}</h3><div class="spacer"></div><button class="iconbtn" data-close>✕</button></div>
    <div class="mb"><div class="formgrid">
      <div class="field" style="grid-column:1/-1"><label>Nome</label><input id="stName" value="${esc(s.name)}" placeholder="Nome do aluno"></div>
      <div class="field"><label>Sexo</label><select id="stSex"><option value="2" ${s.sex==="2"?"selected":""}>Masculino</option><option value="1" ${s.sex==="1"?"selected":""}>Feminino</option></select></div>
      <div class="field"><label>Idade</label><input id="stAge" inputmode="decimal" value="${esc(s.age)}"></div>
      <div class="field"><label>Objetivo</label><input id="stGoal" value="${esc(s.goal)}" placeholder="ex: Hipertrofia"></div>
      <div class="field"><label>Início</label><input id="stStart" type="date" value="${esc(s.startDate)}"></div>
      ${existing?`<label class="field" style="grid-column:1/-1;flex-direction:row;align-items:center;gap:9px"><input type="checkbox" id="stActive" ${s.active?"checked":""} style="width:16px;height:16px;accent-color:var(--accent)"><span>Aluno ativo</span></label>`:""}
    </div></div>
    <div class="mf">${existing?`<button class="btn ghost danger" id="stDel" style="margin-right:auto">Excluir aluno</button>`:""}<button class="btn ghost" data-close>Cancelar</button><button class="btn primary" id="stSave">${existing?"Salvar":"Criar aluno"}</button></div>`);
  $("#stSave").onclick=async ()=>{
    const data={name:$("#stName").value.trim()||"Novo aluno",sex:$("#stSex").value,age:$("#stAge").value.trim(),goal:$("#stGoal").value.trim(),startDate:$("#stStart").value};
    if(existing){Object.assign(existing,data);if($("#stActive"))existing.active=$("#stActive").checked;closeModal();renderView();await saveStudent(existing);toast("Aluno atualizado ✔","good");}
    else{closeModal();showLoading("Criando aluno…");const st=await createStudent(data);closeGate();if(st){renderBrand();openStudent(st.id);toast("Aluno criado ✔","good");}else renderView();}
  };
  const dl=$("#stDel");if(dl)dl.onclick=async ()=>{if(!confirm(`Excluir "${existing.name}" e todos os dados? Sem volta.`))return;closeModal();const ok=await deleteStudentCloud(existing.id);if(!ok)return;state.students=state.students.filter(x=>x.id!==existing.id);if(ui.curStudent===existing.id){ui.curStudent=state.students[0]?.id||null;ui.view="roster";}renderBrand();renderView();toast("Aluno excluído","bad");};
}
function coachSettingsModal(){
  openModal(`<div class="mh"><h3>Marca da consultoria</h3><div class="spacer"></div><button class="iconbtn" data-close>✕</button></div>
    <div class="mb"><div class="field"><label>Nome / marca exibido no topo e para os alunos</label><input id="csCoach" value="${esc(state.meta.coachName)}"></div></div>
    <div class="mf"><button class="btn ghost" data-close>Cancelar</button><button class="btn primary" id="csSave">Salvar</button></div>`);
  $("#csSave").onclick=()=>{state.meta.coachName=$("#csCoach").value.trim()||"Consultoria";localStorage.setItem("coach_name",state.meta.coachName);renderBrand();closeModal();toast("Salvo ✔","good");};
}

/* ---- modal infra ---- */
function openModal(h){$("#modal").innerHTML=h;$("#overlay").classList.add("open");}
function closeModal(){$("#overlay").classList.remove("open");}

/* ---- files ---- */
function download(fn,txt){const b=new Blob([txt],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=fn;a.click();URL.revokeObjectURL(u);}
function slug(s){return(s||"aluno").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-z0-9]+/gi,"_").toLowerCase();}
function saveFile(){state.meta.clientSnapshot=false;download(`carteira_${slug(state.meta.coachName)}.json`,JSON.stringify(state,null,2));dirty=false;renderSaveState();cacheLocal();toast("Carteira salva ✔","good");}
function copyStudentLink(id){
  const s=state.students.find(x=>x.id===id)||cur();
  if(!s){toast("Selecione um aluno","bad");return;}
  if(!s.access_token){toast("Salve o aluno antes","bad");return;}
  const link=appUrl()+"#s="+s.access_token;
  const done=()=>toast("Link de "+s.name+" copiado 🔗","good");
  if(navigator.clipboard&&navigator.clipboard.writeText) navigator.clipboard.writeText(link).then(done).catch(()=>prompt("Link do aluno:",link));
  else prompt("Link do aluno:",link);
}
function exportStudent(id){
  const s=state.students.find(x=>x.id===id)||cur();if(!s){toast("Selecione um aluno","bad");return;}
  const snap={version:2,meta:{coachName:state.meta.coachName,pin:"",createdAt:Date.now(),updatedAt:Date.now(),clientSnapshot:true},
    students:[JSON.parse(JSON.stringify(s))]};
  snap.students[0].weeks=snap.students[0].weeks.filter(w=>w.status==="publicado");
  download(`treino_${slug(s.name)}_ALUNO.json`,JSON.stringify(snap,null,2));
  toast(`Versão de ${s.name} exportada 📤`,"good");
}
function openFile(){$("#fileInput").click();}
$("#fileInput").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{let obj=JSON.parse(r.result);obj=migrate(obj);if(!obj.students||!obj.meta)throw 0;
    state=obj;document.body.classList.toggle("snapshot",!!state.meta.clientSnapshot);
    if(state.meta.clientSnapshot){ui.mode="aluno";ui.curStudent=state.students[0]?.id;ui.view="workspace";}
    else{ui.mode="coach";ui.curStudent=state.students[0]?.id;ui.view="roster";}
    applyMode();renderBrand();renderView();cacheLocal();dirty=false;renderSaveState();toast("Arquivo carregado ✔","good");
  }catch(err){toast("Arquivo inválido","bad");}};r.readAsText(f);e.target.value="";});

/* ---- toast ---- */
function toast(m,k){const t=$("#toast");t.textContent=m;t.className="toast show "+(k||"");clearTimeout(t._t);t._t=setTimeout(()=>t.className="toast",2200);}

/* ---- events ---- */
document.addEventListener("click",e=>{
  const t=e.target;
  if(t.closest("#menuBtn")){$("#dataMenu").classList.toggle("open");return;}
  if(!t.closest(".menu-wrap"))$("#dataMenu").classList.remove("open");
  if(t.closest("#switcherBtn")){$("#swDrop").classList.toggle("open");return;}
  if(!t.closest("#switcher"))$("#swDrop").classList.remove("open");

  const act=t.closest("[data-act]");if(act){$("#dataMenu").classList.remove("open");const a=act.dataset.act;
    if(a==="save")saveFile();if(a==="aluno-export")exportStudent(ui.curStudent);
    if(a==="student-link")copyStudentLink(ui.curStudent);
    if(a==="print"){window.print();}if(a==="coach-settings")coachSettingsModal();
    if(a==="logout"){if(confirm("Sair da conta?"))logout();}return;}

  const mb=t.closest("[data-mode]");if(mb){setMode(mb.dataset.mode);return;}
  const tb=t.closest("[data-tab]");if(tb){setTab(tb.dataset.tab);return;}
  if(t.closest("[data-close]")||t===$("#overlay")){closeModal();return;}

  // brand click -> roster (coach)
  if(t.closest("#brand")&&ui.mode==="coach"&&!state.meta.clientSnapshot){setView("roster");return;}
  if(t.closest("#crumbBack")){setView("roster");return;}

  // switcher
  const sw=t.closest("[data-sw]");if(sw){$("#swDrop").classList.remove("open");if(sw.dataset.sw==="__all")setView("roster");else openStudent(sw.dataset.sw);return;}

  // roster
  if(t.closest("#btnNewStudent")||t.closest("#addCard")){studentModal(null);return;}
  const lnk=t.closest("[data-link]");if(lnk){e.stopPropagation();copyStudentLink(lnk.dataset.link);return;}
  const exp=t.closest("[data-exp]");if(exp){e.stopPropagation();exportStudent(exp.dataset.exp);return;}
  const eds=t.closest("[data-edits]");if(eds){e.stopPropagation();studentModal(state.students.find(s=>s.id===eds.dataset.edits));return;}
  const dls=t.closest("[data-dels]");if(dls){e.stopPropagation();studentModal(state.students.find(s=>s.id===dls.dataset.dels));return;}
  const op=t.closest("[data-open]");if(op){openStudent(op.dataset.open);return;}

  // weeks
  const wk=t.closest("[data-wk]");if(wk){ui.selWeek=wk.dataset.wk;ui.compare=false;renderWeekList();renderWeekEditor();return;}
  if(t.closest("#btnDuplicate")||t.closest("#acDup"))return duplicateWeek();
  if(t.closest("#btnNewWeek"))return newBlankWeek();
  if(t.closest("#acDelWeek"))return delWeek();
  if(t.closest("#acAddDay"))return addDay();
  if(t.closest("#acCmp")){ui.compare=!ui.compare;renderWeekEditor();return;}
  const ax=t.closest("[data-addex]");if(ax)return addEx(ax.dataset.addex);
  const dx=t.closest("[data-delex]");if(dx){const w=findWeek(ui.selWeek),d=w.days.find(x=>x.id===dx.dataset.day);d.exercises=d.exercises.filter(x=>x.id!==dx.dataset.delex);markDirty();renderWeekEditor();return;}
  const dd=t.closest("[data-delday]");if(dd){const w=findWeek(ui.selWeek);if(w.days.length<=1){toast("Mantenha ao menos 1 treino","bad");return;}if(confirm("Remover este treino?")){w.days=w.days.filter(x=>x.id!==dd.dataset.delday);markDirty();renderWeekEditor();}return;}
  const ck=t.closest("[data-chk]");if(ck){const w=findWeek(ui.selWeek),d=w.days.find(x=>x.id===ck.dataset.day),ex=d.exercises.find(x=>x.id===ck.dataset.chk);ex.done=!ex.done;markDirty();ck.classList.toggle("done",ex.done);return;}

  // aval
  if(t.closest("#btnNewAval"))return avalModal(null);
  const da=t.closest("[data-delaval]");if(da)return delAval(da.dataset.delaval);
});

document.addEventListener("input",e=>{
  const t=e.target;
  if(t.id==="rosterSearch"){ui.search=t.value;renderRoster();return;}
  const wf=t.dataset.wf;if(wf!==undefined){const w=findWeek(ui.selWeek);if(w){w[wf]=t.value;if(["label","status","startDate","month"].includes(wf))renderWeekList();markDirty();}return;}
  const df=t.dataset.df;if(df!==undefined){const id=t.dataset.day||t.closest("[data-day]")?.dataset.day;const d=findWeek(ui.selWeek)?.days.find(x=>x.id===id);if(d){d[df]=t.value;markDirty();}return;}
  const ef=t.dataset.ef;if(ef!==undefined){const tr=t.closest("[data-ex]");const d=findWeek(ui.selWeek)?.days.find(x=>x.id===tr.dataset.day);const ex=d?.exercises.find(x=>x.id===tr.dataset.ex);if(ex){ex[ef]=t.value;markDirty();}return;}
});

$("#cmpTable").addEventListener("click",e=>{if(ui.mode!=="coach")return;const th=e.target.closest("thead th");if(!th||e.target.closest("[data-delaval]"))return;const idx=[...th.parentNode.children].indexOf(th);if(idx<1)return;const a=sortedAssessments()[idx-1];if(a)avalModal(a);});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});
window.addEventListener("beforeunload",e=>{if(dirty){e.preventDefault();e.returnValue="";}});

boot();
</script>
</body>
</html>
